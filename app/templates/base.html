<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HypeClip{% endblock %} — Twitch Clip to Shorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f0f0f',
                            800: '#161616',
                            700: '#1e1e1e',
                            600: '#2a2a2a',
                            500: '#3a3a3a',
                        },
                        accent: {
                            DEFAULT: '#9147FF',
                            light: '#BF94FF',
                            dark: '#772CE8',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body { background-color: #0f0f0f; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161616; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-accent { box-shadow: 0 0 20px rgba(145, 71, 255, 0.3); }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(145, 71, 255, 0.2); }
            50%       { box-shadow: 0 0 20px rgba(145, 71, 255, 0.5); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen flex flex-col antialiased">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 border-b border-white/5 bg-dark-900/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center group-hover:bg-accent-light transition-colors">
                        <i class="fas fa-play text-white text-sm"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">
                        <span class="text-white">Hype</span><span class="text-accent-light">Clip</span>
                    </span>
                </a>

                <!-- Right side -->
                <div class="flex items-center gap-3">
                    <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">
                        <i class="fas fa-house text-xs mr-1"></i> Home
                    </a>

                    {% if current_user.is_authenticated %}
                        <!-- User dropdown -->
                        <div class="relative" id="user-menu-container">
                            <button id="user-menu-btn"
                                class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-dark-700 border border-white/10 hover:border-accent/40 transition-colors text-sm">
                                <i class="fas fa-user-circle text-accent text-base"></i>
                                <span class="text-gray-300 font-medium">{{ current_user.username }}</span>
                                {% if current_user.is_admin() %}
                                    <span class="text-xs px-1.5 py-0.5 rounded bg-accent/20 text-accent-light font-semibold">Admin</span>
                                {% endif %}
                                <i class="fas fa-chevron-down text-gray-500 text-xs"></i>
                            </button>
                            <div id="user-dropdown"
                                class="hidden absolute right-0 top-full mt-2 w-48 glass rounded-xl py-1 shadow-xl z-50">
                                {% if current_user.is_admin() %}
                                <a href="/admin" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:text-white hover:bg-white/5 transition-colors">
                                    <i class="fas fa-shield-halved text-accent w-4"></i> Panel Admin
                                </a>
                                <div class="border-t border-white/10 my-1"></div>
                                {% endif %}
                                <a href="/logout" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:text-red-400 hover:bg-white/5 transition-colors">
                                    <i class="fas fa-right-from-bracket text-gray-500 w-4"></i> Déconnexion
                                </a>
                            </div>
                        </div>
                    {% else %}
                        <button onclick="openAuthModal('login')"
                            class="flex items-center gap-1.5 px-4 py-1.5 rounded-lg bg-accent hover:bg-accent-dark text-white text-sm font-semibold transition-colors glow-accent">
                            <i class="fas fa-right-to-bracket text-xs"></i> Connexion
                        </button>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
            <p>Made by <span class="text-white font-medium">B_nair</span> with ❤️</p>
        </div>
    </footer>

    <!-- Auth modal (login / register) -->
    <div id="auth-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeAuthModal()"></div>
        <div class="relative max-w-sm mx-auto mt-[10vh] px-4">
            <div class="glass rounded-2xl p-6 shadow-2xl">
                <!-- Logo -->
                <div class="flex flex-col items-center mb-6">
                    <div class="w-12 h-12 rounded-xl bg-accent flex items-center justify-center mb-3 glow-accent">
                        <i class="fas fa-play text-white"></i>
                    </div>
                    <h2 class="text-2xl font-bold">
                        <span class="text-white">Hype</span><span class="text-accent-light">Clip</span>
                    </h2>
                </div>

                <!-- Tabs -->
                <div class="flex gap-1 mb-5 bg-dark-700 rounded-xl p-1">
                    <button id="tab-login-btn" onclick="switchAuthTab('login')"
                        class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all bg-dark-600 text-white">
                        Connexion
                    </button>
                    <button id="tab-register-btn" onclick="switchAuthTab('register')"
                        class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-white">
                        Inscription
                    </button>
                </div>

                <!-- Login form -->
                <div id="auth-form-login" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Nom d'utilisateur</label>
                        <input id="login-username" type="text" autocomplete="username"
                            placeholder="admin"
                            class="w-full px-4 py-3 rounded-xl bg-dark-700 border border-white/10 text-white placeholder-gray-600
                                   focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/40 transition-colors" />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Mot de passe</label>
                        <input id="login-password" type="password" autocomplete="current-password"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 rounded-xl bg-dark-700 border border-white/10 text-white placeholder-gray-600
                                   focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/40 transition-colors" />
                    </div>
                    <p id="login-error" class="hidden text-red-400 text-sm"></p>
                    <button onclick="submitLogin()"
                        class="w-full py-3 bg-accent hover:bg-accent-dark text-white font-semibold rounded-xl transition-colors glow-accent">
                        Se connecter
                    </button>
                </div>

                <!-- Register form -->
                <div id="auth-form-register" class="hidden space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Nom d'utilisateur</label>
                        <input id="reg-username" type="text" autocomplete="username"
                            placeholder="votre_pseudo"
                            class="w-full px-4 py-3 rounded-xl bg-dark-700 border border-white/10 text-white placeholder-gray-600
                                   focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/40 transition-colors" />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Mot de passe <span class="text-gray-600">(min. 6 caractères)</span></label>
                        <input id="reg-password" type="password" autocomplete="new-password"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 rounded-xl bg-dark-700 border border-white/10 text-white placeholder-gray-600
                                   focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/40 transition-colors" />
                    </div>
                    <p id="reg-error" class="hidden text-red-400 text-sm"></p>
                    <button onclick="submitRegister()"
                        class="w-full py-3 bg-accent hover:bg-accent-dark text-white font-semibold rounded-xl transition-colors glow-accent">
                        Créer mon compte
                    </button>
                </div>
            </div>
        </div>
    </div>

    {% block extra_js %}{% endblock %}

    <script>
    // ---- User menu dropdown ----
    (function() {
        const btn = document.getElementById('user-menu-btn');
        const dropdown = document.getElementById('user-dropdown');
        if (!btn) return;
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
        });
        document.addEventListener('click', () => dropdown?.classList.add('hidden'));
    })();

    // ---- Auth modal ----
    function openAuthModal(tab) {
        document.getElementById('auth-modal').classList.remove('hidden');
        switchAuthTab(tab || 'login');
        setTimeout(() => {
            const el = tab === 'register'
                ? document.getElementById('reg-username')
                : document.getElementById('login-username');
            el?.focus();
        }, 50);
    }

    function closeAuthModal() {
        document.getElementById('auth-modal').classList.add('hidden');
    }

    function switchAuthTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('auth-form-login').classList.toggle('hidden', !isLogin);
        document.getElementById('auth-form-register').classList.toggle('hidden', isLogin);
        document.getElementById('tab-login-btn').className = `flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${isLogin ? 'bg-dark-600 text-white' : 'text-gray-400 hover:text-white'}`;
        document.getElementById('tab-register-btn').className = `flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${!isLogin ? 'bg-dark-600 text-white' : 'text-gray-400 hover:text-white'}`;
    }

    async function submitLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errEl    = document.getElementById('login-error');
        errEl.classList.add('hidden');

        try {
            const resp = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await resp.json();
            if (data.ok) {
                window.location.reload();
            } else {
                errEl.textContent = data.error || 'Erreur inconnue';
                errEl.classList.remove('hidden');
            }
        } catch(e) {
            errEl.textContent = 'Erreur réseau';
            errEl.classList.remove('hidden');
        }
    }

    async function submitRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const errEl    = document.getElementById('reg-error');
        errEl.classList.add('hidden');

        try {
            const resp = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await resp.json();
            if (data.ok) {
                window.location.reload();
            } else {
                errEl.textContent = data.error || 'Erreur inconnue';
                errEl.classList.remove('hidden');
            }
        } catch(e) {
            errEl.textContent = 'Erreur réseau';
            errEl.classList.remove('hidden');
        }
    }

    // Enter key on auth inputs
    ['login-username','login-password'].forEach(id => {
        document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') submitLogin(); });
    });
    ['reg-username','reg-password'].forEach(id => {
        document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') submitRegister(); });
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAuthModal(); });
    </script>
</body>
</html>
