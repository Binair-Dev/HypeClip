<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HypeClip{% endblock %} — Twitch Clip to Shorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f0f0f',
                            800: '#161616',
                            700: '#1e1e1e',
                            600: '#2a2a2a',
                            500: '#3a3a3a',
                        },
                        accent: {
                            DEFAULT: '#9147FF',
                            light: '#BF94FF',
                            dark: '#772CE8',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body { background-color: #0f0f0f; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161616; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }
        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        /* Twitch accent glow */
        .glow-accent {
            box-shadow: 0 0 20px rgba(145, 71, 255, 0.3);
        }
        /* Pulse animation for loading */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(145, 71, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(145, 71, 255, 0.5); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen flex flex-col antialiased">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 border-b border-white/5 bg-dark-900/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center group-hover:bg-accent-light transition-colors">
                        <i class="fas fa-play text-white text-sm"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">
                        <span class="text-white">Hype</span><span class="text-accent-light">Clip</span>
                    </span>
                </a>

                <!-- Right side (placeholder) -->
                <div class="flex items-center gap-3">
                    <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">
                        <i class="fas fa-house text-xs mr-1"></i> Home
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
            <p>Made by <span class="text-white font-medium">B_nair</span> with ❤️</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
